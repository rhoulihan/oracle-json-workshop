<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 200" font-family="Source Sans Pro, -apple-system, sans-serif">
  <defs>
    <marker id="jt2" viewBox="0 0 10 10" refX="10" refY="5" markerWidth="7" markerHeight="7" orient="auto"><path d="M0,0 L10,5 L0,10" fill="#C74634"/></marker>
  </defs>
  <rect width="600" height="200" rx="8" fill="#F7F6F5"/>
  <text x="300" y="24" text-anchor="middle" font-size="13" font-weight="700" fill="#312D2A">JSON_TABLE — JSON Array to SQL Rows</text>
  <!-- JSON document on left -->
  <rect x="20" y="42" width="160" height="120" rx="8" fill="#fff" stroke="#E5E2DF" stroke-width="1.5"/>
  <text x="100" y="60" text-anchor="middle" font-size="10" font-weight="600" fill="#312D2A">JSON Document</text>
  <text x="34" y="78" font-size="9" fill="#312D2A" font-family="Source Code Pro, monospace">{</text>
  <text x="42" y="92" font-size="9" fill="#9B9590" font-family="Source Code Pro, monospace">"advisor": "Sarah",</text>
  <text x="42" y="106" font-size="9" fill="#C74634" font-weight="600" font-family="Source Code Pro, monospace">"clients": [</text>
  <text x="50" y="120" font-size="8" fill="#C74634" font-family="Source Code Pro, monospace">{"name":"Emily"},</text>
  <text x="50" y="133" font-size="8" fill="#C74634" font-family="Source Code Pro, monospace">{"name":"James"}</text>
  <text x="42" y="148" font-size="9" fill="#C74634" font-weight="600" font-family="Source Code Pro, monospace">]</text>
  <!-- Arrow -->
  <line x1="183" y1="100" x2="230" y2="100" stroke="#C74634" stroke-width="2" marker-end="url(#jt2)"/>
  <!-- JSON_TABLE box -->
  <rect x="234" y="80" width="110" height="42" rx="6" fill="#312D2A"/>
  <text x="289" y="98" text-anchor="middle" font-size="9" font-weight="700" fill="#fff">JSON_TABLE</text>
  <text x="289" y="114" text-anchor="middle" font-size="8" fill="rgba(255,255,255,0.6)">NESTED PATH</text>
  <!-- Arrow -->
  <line x1="346" y1="100" x2="392" y2="100" stroke="#C74634" stroke-width="2" marker-end="url(#jt2)"/>
  <!-- Relational rows on right -->
  <rect x="396" y="42" width="184" height="120" rx="8" fill="#fff" stroke="#E5E2DF" stroke-width="1.5"/>
  <text x="488" y="60" text-anchor="middle" font-size="10" font-weight="600" fill="#312D2A">SQL Rows</text>
  <!-- Table header -->
  <rect x="408" y="68" width="160" height="18" rx="3" fill="#312D2A"/>
  <text x="450" y="80" text-anchor="middle" font-size="8" font-weight="600" fill="#fff">advisor</text>
  <text x="530" y="80" text-anchor="middle" font-size="8" font-weight="600" fill="#fff">client_name</text>
  <!-- Row 1 -->
  <rect x="408" y="86" width="160" height="22" fill="#1B7D3A" fill-opacity="0.06"/>
  <text x="450" y="100" text-anchor="middle" font-size="9" fill="#312D2A" font-family="Source Code Pro, monospace">Sarah</text>
  <text x="530" y="100" text-anchor="middle" font-size="9" fill="#312D2A" font-family="Source Code Pro, monospace">Emily</text>
  <!-- Row 2 -->
  <rect x="408" y="108" width="160" height="22" fill="#fff"/>
  <text x="450" y="122" text-anchor="middle" font-size="9" fill="#312D2A" font-family="Source Code Pro, monospace">Sarah</text>
  <text x="530" y="122" text-anchor="middle" font-size="9" fill="#312D2A" font-family="Source Code Pro, monospace">James</text>
  <!-- Row 3 (ellipsis) -->
  <rect x="408" y="130" width="160" height="18" fill="#1B7D3A" fill-opacity="0.06"/>
  <text x="488" y="143" text-anchor="middle" font-size="9" fill="#9B9590">...</text>
  <!-- Bottom label -->
  <rect x="170" y="172" width="260" height="22" rx="5" fill="#C74634" fill-opacity="0.08" stroke="#C74634" stroke-width="1"/>
  <text x="300" y="187" text-anchor="middle" font-size="10" font-weight="600" fill="#C74634">JSON array → SQL rows (inverse of ARRAYAGG)</text>
</svg>