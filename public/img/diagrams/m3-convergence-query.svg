<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 200" font-family="Source Sans Pro, -apple-system, sans-serif">
  <defs>
    <marker id="cq1" viewBox="0 0 10 10" refX="10" refY="5" markerWidth="7" markerHeight="7" orient="auto"><path d="M0,0 L10,5 L0,10" fill="#C74634"/></marker>
  </defs>
  <rect width="600" height="200" rx="8" fill="#F7F6F5"/>
  <text x="300" y="24" text-anchor="middle" font-size="13" font-weight="700" fill="#312D2A">Convergence Query — 3 Paradigms, 1 Query</text>
  <!-- Source 1: Collection -->
  <rect x="20" y="50" width="140" height="44" rx="6" fill="#C74634" fill-opacity="0.08" stroke="#C74634" stroke-width="1.5"/>
  <text x="90" y="70" text-anchor="middle" font-size="10" font-weight="600" fill="#C74634">JSON Collection</text>
  <text x="90" y="84" text-anchor="middle" font-size="8" fill="#9B9590">advisory_entities</text>
  <!-- Source 2: Relational -->
  <rect x="20" y="105" width="140" height="44" rx="6" fill="#1B7D3A" fill-opacity="0.08" stroke="#1B7D3A" stroke-width="1.5"/>
  <text x="90" y="125" text-anchor="middle" font-size="10" font-weight="600" fill="#1B7D3A">Relational Table</text>
  <text x="90" y="139" text-anchor="middle" font-size="8" fill="#9B9590">advisors, clients</text>
  <!-- Source 3: Duality View -->
  <rect x="20" y="160" width="140" height="34" rx="6" fill="#996B00" fill-opacity="0.08" stroke="#996B00" stroke-width="1.5"/>
  <text x="90" y="181" text-anchor="middle" font-size="10" font-weight="600" fill="#996B00">Duality View</text>
  <!-- Arrows converging -->
  <line x1="162" y1="72" x2="228" y2="100" stroke="#C74634" stroke-width="2" marker-end="url(#cq1)"/>
  <line x1="162" y1="125" x2="228" y2="110" stroke="#C74634" stroke-width="2" marker-end="url(#cq1)"/>
  <line x1="162" y1="175" x2="228" y2="120" stroke="#C74634" stroke-width="2" marker-end="url(#cq1)"/>
  <!-- JOIN box -->
  <rect x="232" y="85" width="80" height="50" rx="6" fill="#312D2A"/>
  <text x="272" y="107" text-anchor="middle" font-size="10" font-weight="700" fill="#fff">JOIN</text>
  <text x="272" y="124" text-anchor="middle" font-size="8" fill="rgba(255,255,255,0.6)">SQL optimizer</text>
  <!-- Arrow to result -->
  <line x1="314" y1="110" x2="360" y2="110" stroke="#C74634" stroke-width="2" marker-end="url(#cq1)"/>
  <!-- Result set -->
  <rect x="365" y="50" width="215" height="120" rx="8" fill="#fff" stroke="#E5E2DF" stroke-width="1.5"/>
  <text x="472" y="70" text-anchor="middle" font-size="10" font-weight="600" fill="#312D2A">Unified Result</text>
  <!-- Result table header -->
  <rect x="378" y="78" width="190" height="18" rx="3" fill="#312D2A"/>
  <text x="405" y="90" text-anchor="middle" font-size="7" font-weight="600" fill="#fff">advisor</text>
  <text x="448" y="90" text-anchor="middle" font-size="7" font-weight="600" fill="#fff">client</text>
  <text x="500" y="90" text-anchor="middle" font-size="7" font-weight="600" fill="#fff">entity_count</text>
  <text x="555" y="90" text-anchor="middle" font-size="7" font-weight="600" fill="#fff">src</text>
  <!-- Result rows -->
  <rect x="378" y="96" width="190" height="16" fill="#C74634" fill-opacity="0.05"/>
  <text x="405" y="107" text-anchor="middle" font-size="7" fill="#312D2A">Sarah</text>
  <text x="448" y="107" text-anchor="middle" font-size="7" fill="#312D2A">Emily</text>
  <text x="500" y="107" text-anchor="middle" font-size="7" fill="#312D2A">12</text>
  <text x="555" y="107" text-anchor="middle" font-size="7" fill="#9B9590">3 tbls</text>
  <rect x="378" y="112" width="190" height="16" fill="#fff"/>
  <text x="405" y="123" text-anchor="middle" font-size="7" fill="#312D2A">Michael</text>
  <text x="448" y="123" text-anchor="middle" font-size="7" fill="#312D2A">James</text>
  <text x="500" y="123" text-anchor="middle" font-size="7" fill="#312D2A">8</text>
  <text x="555" y="123" text-anchor="middle" font-size="7" fill="#9B9590">3 tbls</text>
  <rect x="378" y="128" width="190" height="16" fill="#C74634" fill-opacity="0.05"/>
  <text x="405" y="139" text-anchor="middle" font-size="7" fill="#312D2A">Sarah</text>
  <text x="448" y="139" text-anchor="middle" font-size="7" fill="#312D2A">Robert</text>
  <text x="500" y="139" text-anchor="middle" font-size="7" fill="#312D2A">5</text>
  <text x="555" y="139" text-anchor="middle" font-size="7" fill="#9B9590">3 tbls</text>
  <!-- Bottom label -->
  <text x="300" y="192" text-anchor="middle" font-size="10" font-weight="600" fill="#312D2A">Collection + relational + duality view in one SELECT</text>
</svg>