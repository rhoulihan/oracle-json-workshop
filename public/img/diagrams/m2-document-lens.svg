<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 200" font-family="Source Sans Pro, -apple-system, sans-serif">
  <defs>
    <marker id="dlArr" viewBox="0 0 10 10" refX="10" refY="5" markerWidth="7" markerHeight="7" orient="auto"><path d="M0,0 L10,5 L0,10" fill="#C74634"/></marker>
  </defs>
  <rect width="600" height="200" rx="8" fill="#F7F6F5"/>
  <text x="300" y="22" text-anchor="middle" font-size="13" font-weight="700" fill="#312D2A">Document Lens — Relational to Nested JSON</text>
  <!-- Relational tables on left -->
  <rect x="20" y="42" width="100" height="30" rx="4" fill="#fff" stroke="#E5E2DF" stroke-width="1"/>
  <text x="70" y="61" text-anchor="middle" font-size="10" font-weight="600" fill="#312D2A">clients</text>
  <rect x="20" y="80" width="100" height="30" rx="4" fill="#fff" stroke="#E5E2DF" stroke-width="1"/>
  <text x="70" y="99" text-anchor="middle" font-size="10" font-weight="600" fill="#312D2A">accounts</text>
  <rect x="20" y="118" width="100" height="30" rx="4" fill="#fff" stroke="#E5E2DF" stroke-width="1"/>
  <text x="70" y="137" text-anchor="middle" font-size="10" font-weight="600" fill="#312D2A">holdings</text>
  <text x="70" y="165" text-anchor="middle" font-size="9" fill="#9B9590">3 normalized tables</text>
  <!-- Duality View in center -->
  <line x1="128" y1="72" x2="200" y2="90" stroke="#C74634" stroke-width="2" marker-end="url(#dlArr)"/>
  <line x1="128" y1="95" x2="200" y2="95" stroke="#C74634" stroke-width="2" marker-end="url(#dlArr)"/>
  <line x1="128" y1="118" x2="200" y2="100" stroke="#C74634" stroke-width="2" marker-end="url(#dlArr)"/>
  <rect x="205" y="60" width="130" height="70" rx="8" fill="#312D2A"/>
  <text x="270" y="84" text-anchor="middle" font-size="11" font-weight="700" fill="#fff">Duality View</text>
  <text x="270" y="100" text-anchor="middle" font-size="9" fill="rgba(255,255,255,0.6)">client_portfolio_dv</text>
  <text x="270" y="118" text-anchor="middle" font-size="9" fill="#C74634">computed on read</text>
  <!-- Arrow to JSON -->
  <line x1="340" y1="95" x2="380" y2="95" stroke="#C74634" stroke-width="2" marker-end="url(#dlArr)"/>
  <!-- Nested JSON document on right -->
  <rect x="385" y="40" width="195" height="130" rx="8" fill="#C74634" fill-opacity="0.06" stroke="#C74634" stroke-width="1.5"/>
  <text x="482" y="58" text-anchor="middle" font-size="10" font-weight="700" fill="#C74634">JSON Document</text>
  <text x="400" y="76" font-size="9" fill="#312D2A" font-family="Source Code Pro, monospace">{ "firstName": "Emily",</text>
  <text x="410" y="91" font-size="9" fill="#312D2A" font-family="Source Code Pro, monospace">"accounts": [{</text>
  <text x="420" y="106" font-size="9" fill="#312D2A" font-family="Source Code Pro, monospace">"type": "BROKERAGE",</text>
  <text x="420" y="121" font-size="9" fill="#312D2A" font-family="Source Code Pro, monospace">"holdings": [{...}]</text>
  <text x="410" y="136" font-size="9" fill="#312D2A" font-family="Source Code Pro, monospace">}]</text>
  <text x="400" y="151" font-size="9" fill="#312D2A" font-family="Source Code Pro, monospace">}</text>
  <!-- Bottom label -->
  <rect x="170" y="175" width="260" height="20" rx="4" fill="#1B7D3A" fill-opacity="0.08"/>
  <text x="300" y="189" text-anchor="middle" font-size="10" font-weight="600" fill="#1B7D3A">SELECT → automatic join + nesting</text>
</svg>