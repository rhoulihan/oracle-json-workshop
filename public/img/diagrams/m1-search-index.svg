<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 200" font-family="Source Sans Pro, -apple-system, sans-serif">
  <defs>
    <marker id="arr1" viewBox="0 0 10 10" refX="10" refY="5" markerWidth="8" markerHeight="8" orient="auto"><path d="M0,0 L10,5 L0,10" fill="#C74634"/></marker>
  </defs>
  <rect width="600" height="200" rx="8" fill="#F7F6F5"/>
  <text x="300" y="24" text-anchor="middle" font-size="13" font-weight="700" fill="#312D2A">JSON Search Index: Full-Text Search on Documents</text>
  <!-- Documents stack -->
  <rect x="24" y="62" width="120" height="18" rx="4" fill="#fff" stroke="#E5E2DF" stroke-width="1"/>
  <rect x="22" y="56" width="120" height="18" rx="4" fill="#fff" stroke="#E5E2DF" stroke-width="1"/>
  <rect x="20" y="50" width="120" height="18" rx="4" fill="#fff" stroke="#E5E2DF" stroke-width="1.5"/>
  <text x="80" y="63" text-anchor="middle" font-size="9" fill="#312D2A" font-family="Source Code Pro, monospace">{"summary":...}</text>
  <text x="80" y="43" text-anchor="middle" font-size="10" font-weight="600" fill="#312D2A">Collection</text>
  <!-- Arrow to index -->
  <line x1="146" y1="65" x2="208" y2="65" stroke="#C74634" stroke-width="2" marker-end="url(#arr1)"/>
  <text x="177" y="58" text-anchor="middle" font-size="8" font-weight="600" fill="#C74634">auto-sync</text>
  <!-- Search Index box -->
  <rect x="210" y="42" width="160" height="68" rx="8" fill="#312D2A"/>
  <text x="290" y="63" text-anchor="middle" font-size="11" font-weight="700" fill="#fff">JSON Search Index</text>
  <text x="290" y="80" text-anchor="middle" font-size="9" fill="rgba(255,255,255,0.6)">Full-text tokenization</text>
  <text x="290" y="94" text-anchor="middle" font-size="9" fill="rgba(255,255,255,0.6)">All fields indexed</text>
  <!-- Arrow to query -->
  <line x1="372" y1="65" x2="428" y2="65" stroke="#C74634" stroke-width="2" marker-end="url(#arr1)"/>
  <text x="400" y="58" text-anchor="middle" font-size="8" font-weight="600" fill="#C74634">query</text>
  <!-- Query result box -->
  <rect x="430" y="42" width="150" height="68" rx="8" fill="#fff" stroke="#E5E2DF" stroke-width="1.5"/>
  <text x="505" y="60" text-anchor="middle" font-size="9" font-weight="600" fill="#312D2A">JSON_TEXTCONTAINS</text>
  <text x="505" y="77" text-anchor="middle" font-size="8" fill="#9B9590" font-family="Source Code Pro, monospace">(data, '$', 'retirement')</text>
  <text x="505" y="94" text-anchor="middle" font-size="9" fill="#1B7D3A">Matching documents</text>
  <!-- CREATE INDEX SQL -->
  <rect x="30" y="120" width="540" height="28" rx="5" fill="#C74634" fill-opacity="0.08" stroke="#C74634" stroke-width="1"/>
  <text x="300" y="138" text-anchor="middle" font-size="9" font-weight="600" fill="#C74634" font-family="Source Code Pro, monospace">CREATE SEARCH INDEX idx ON client_interactions (data) FOR JSON;</text>
  <!-- Comparison callouts -->
  <rect x="30" y="158" width="260" height="28" rx="5" fill="#1B7D3A" fill-opacity="0.08" stroke="#1B7D3A" stroke-width="1"/>
  <text x="160" y="176" text-anchor="middle" font-size="10" font-weight="600" fill="#1B7D3A">Oracle: transactionally consistent</text>
  <rect x="310" y="158" width="260" height="28" rx="5" fill="#9B9590" fill-opacity="0.1" stroke="#9B9590" stroke-width="1"/>
  <text x="440" y="176" text-anchor="middle" font-size="10" font-weight="600" fill="#9B9590">MongoDB Atlas: 1-15s eventual lag</text>
</svg>