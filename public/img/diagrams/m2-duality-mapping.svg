<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 620 260" font-family="Source Sans Pro, -apple-system, sans-serif">
  <defs>
    <marker id="arr2" viewBox="0 0 10 10" refX="10" refY="5" markerWidth="7" markerHeight="7" orient="auto"><path d="M0,0 L10,5 L0,10" fill="#1B7D3A"/></marker>
    <marker id="arr2r" viewBox="0 0 10 10" refX="0" refY="5" markerWidth="7" markerHeight="7" orient="auto"><path d="M10,0 L0,5 L10,10" fill="#1B7D3A"/></marker>
  </defs>
  <rect width="620" height="260" rx="8" fill="#F7F6F5"/>
  <text x="310" y="24" text-anchor="middle" font-size="13" font-weight="700" fill="#312D2A">JSON Duality Views — Bidirectional Mapping</text>
  <!-- Document Shape -->
  <rect x="20" y="45" width="220" height="155" rx="8" fill="#C74634" fill-opacity="0.06" stroke="#C74634" stroke-width="1.5"/>
  <text x="130" y="66" text-anchor="middle" font-size="11" font-weight="700" fill="#C74634">Document Shape</text>
  <text x="40" y="88" font-size="10" fill="#312D2A" font-family="Source Code Pro, monospace">{</text>
  <text x="50" y="103" font-size="10" fill="#312D2A" font-family="Source Code Pro, monospace">"firstName": "Emily",</text>
  <text x="50" y="118" font-size="10" fill="#312D2A" font-family="Source Code Pro, monospace">"accounts": [</text>
  <text x="60" y="133" font-size="10" fill="#312D2A" font-family="Source Code Pro, monospace">{ "holdings": [...] }</text>
  <text x="50" y="148" font-size="10" fill="#312D2A" font-family="Source Code Pro, monospace">]</text>
  <text x="40" y="163" font-size="10" fill="#312D2A" font-family="Source Code Pro, monospace">}</text>
  <text x="130" y="190" text-anchor="middle" font-size="9" fill="#9B9590">Projected Shape</text>
  <!-- Bidirectional arrows -->
  <line x1="250" y1="105" x2="365" y2="75" stroke="#1B7D3A" stroke-width="2" marker-end="url(#arr2)" marker-start="url(#arr2r)"/>
  <line x1="250" y1="125" x2="365" y2="115" stroke="#1B7D3A" stroke-width="2" marker-end="url(#arr2)" marker-start="url(#arr2r)"/>
  <line x1="250" y1="145" x2="365" y2="155" stroke="#1B7D3A" stroke-width="2" marker-end="url(#arr2)" marker-start="url(#arr2r)"/>
  <text x="308" y="96" text-anchor="middle" font-size="9" font-weight="600" fill="#1B7D3A">Duality</text>
  <text x="308" y="108" text-anchor="middle" font-size="9" font-weight="600" fill="#1B7D3A">View</text>
  <!-- Relational Tables -->
  <rect x="370" y="45" width="230" height="155" rx="8" fill="#1B7D3A" fill-opacity="0.06" stroke="#1B7D3A" stroke-width="1.5"/>
  <text x="485" y="66" text-anchor="middle" font-size="11" font-weight="700" fill="#1B7D3A">Canonical Form</text>
  <rect x="385" y="78" width="90" height="26" rx="4" fill="#fff" stroke="#E5E2DF" stroke-width="1"/>
  <text x="430" y="95" text-anchor="middle" font-size="10" font-weight="600" fill="#312D2A">clients</text>
  <rect x="385" y="112" width="90" height="26" rx="4" fill="#fff" stroke="#E5E2DF" stroke-width="1"/>
  <text x="430" y="129" text-anchor="middle" font-size="10" font-weight="600" fill="#312D2A">accounts</text>
  <rect x="385" y="146" width="90" height="26" rx="4" fill="#fff" stroke="#E5E2DF" stroke-width="1"/>
  <text x="430" y="163" text-anchor="middle" font-size="10" font-weight="600" fill="#312D2A">holdings</text>
  <text x="540" y="95" font-size="9" fill="#9B9590">PK, FK</text>
  <text x="540" y="129" font-size="9" fill="#9B9590">constraints</text>
  <text x="540" y="163" font-size="9" fill="#9B9590">ACID</text>
  <text x="485" y="190" text-anchor="middle" font-size="9" fill="#9B9590">Source of Truth</text>
  <!-- Bottom summary -->
  <rect x="90" y="215" width="200" height="28" rx="5" fill="#C74634" fill-opacity="0.08"/>
  <text x="190" y="233" text-anchor="middle" font-size="10" font-weight="600" fill="#C74634">1 INSERT → 3 tables populated</text>
  <rect x="330" y="215" width="200" height="28" rx="5" fill="#1B7D3A" fill-opacity="0.08"/>
  <text x="430" y="233" text-anchor="middle" font-size="10" font-weight="600" fill="#1B7D3A">1 DELETE → cascade cleanup</text>
</svg>
