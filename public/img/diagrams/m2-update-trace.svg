<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 200" font-family="Source Sans Pro, -apple-system, sans-serif">
  <defs>
    <marker id="utArr" viewBox="0 0 10 10" refX="10" refY="5" markerWidth="7" markerHeight="7" orient="auto"><path d="M0,0 L10,5 L0,10" fill="#C74634"/></marker>
  </defs>
  <rect width="600" height="200" rx="8" fill="#F7F6F5"/>
  <text x="300" y="22" text-anchor="middle" font-size="13" font-weight="700" fill="#312D2A">Update Trace — JSON Path to Column</text>
  <!-- JSON path at top -->
  <rect x="20" y="40" width="340" height="26" rx="4" fill="#312D2A"/>
  <text x="190" y="57" text-anchor="middle" font-size="10" font-family="Source Code Pro, monospace" fill="#fff">$.accounts[0].holdings[0].marketValue</text>
  <!-- Trace arrows down -->
  <line x1="190" y1="68" x2="190" y2="85" stroke="#C74634" stroke-width="2" marker-end="url(#utArr)"/>
  <!-- Duality view box -->
  <rect x="80" y="88" width="220" height="40" rx="6" fill="#1B7D3A" fill-opacity="0.08" stroke="#1B7D3A" stroke-width="1.5"/>
  <text x="190" y="107" text-anchor="middle" font-size="10" font-weight="600" fill="#1B7D3A">client_portfolio_dv</text>
  <text x="190" y="121" text-anchor="middle" font-size="9" fill="#9B9590">maps path to underlying column</text>
  <!-- Trace arrow down -->
  <line x1="190" y1="130" x2="190" y2="147" stroke="#C74634" stroke-width="2" marker-end="url(#utArr)"/>
  <!-- Target column -->
  <rect x="95" y="150" width="190" height="30" rx="4" fill="#fff" stroke="#E5E2DF" stroke-width="1.5"/>
  <text x="190" y="169" text-anchor="middle" font-size="10" font-weight="600" fill="#312D2A" font-family="Source Code Pro, monospace">holdings.market_value</text>
  <!-- Right side: UPDATE statement -->
  <rect x="380" y="44" width="200" height="80" rx="8" fill="#C74634" fill-opacity="0.06" stroke="#C74634" stroke-width="1.5"/>
  <text x="480" y="62" text-anchor="middle" font-size="10" font-weight="700" fill="#C74634">UPDATE Statement</text>
  <text x="392" y="80" font-size="9" fill="#312D2A" font-family="Source Code Pro, monospace">UPDATE client_portfolio_dv</text>
  <text x="392" y="94" font-size="9" fill="#312D2A" font-family="Source Code Pro, monospace">SET data = ...</text>
  <text x="392" y="108" font-size="9" fill="#312D2A" font-family="Source Code Pro, monospace">WHERE ...</text>
  <!-- Arrow from UPDATE to column -->
  <line x1="480" y1="126" x2="480" y2="158" stroke="#C74634" stroke-width="2" marker-end="url(#utArr)"/>
  <line x1="288" y1="165" x2="475" y2="165" stroke="#C74634" stroke-width="1.5" stroke-dasharray="4,3"/>
  <!-- Result label -->
  <rect x="370" y="148" width="210" height="30" rx="4" fill="#fff" stroke="#E5E2DF" stroke-width="1.5"/>
  <text x="475" y="167" text-anchor="middle" font-size="10" font-weight="600" fill="#1B7D3A">UPDATE holdings SET market_value</text>
  <!-- Bottom label -->
  <rect x="130" y="186" width="340" height="10" rx="3" fill="none"/>
  <text x="300" y="196" text-anchor="middle" font-size="9" fill="#9B9590">JSON write → relational UPDATE on the exact column</text>
</svg>