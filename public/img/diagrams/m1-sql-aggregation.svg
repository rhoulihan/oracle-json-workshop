<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 200" font-family="Source Sans Pro, -apple-system, sans-serif">
  <defs>
    <marker id="arr1" viewBox="0 0 10 10" refX="10" refY="5" markerWidth="8" markerHeight="8" orient="auto"><path d="M0,0 L10,5 L0,10" fill="#C74634"/></marker>
  </defs>
  <rect width="600" height="200" rx="8" fill="#F7F6F5"/>
  <text x="300" y="24" text-anchor="middle" font-size="13" font-weight="700" fill="#312D2A">SQL Aggregation over JSON Documents</text>
  <!-- Documents stack -->
  <rect x="24" y="55" width="120" height="20" rx="4" fill="#fff" stroke="#E5E2DF" stroke-width="1"/>
  <rect x="22" y="49" width="120" height="20" rx="4" fill="#fff" stroke="#E5E2DF" stroke-width="1"/>
  <rect x="20" y="43" width="120" height="20" rx="4" fill="#fff" stroke="#E5E2DF" stroke-width="1.5"/>
  <text x="80" y="57" text-anchor="middle" font-size="8.5" fill="#9B9590" font-family="Source Code Pro, monospace">{"type":...}</text>
  <text x="80" y="38" text-anchor="middle" font-size="10" font-weight="600" fill="#312D2A">JSON Collection</text>
  <!-- Dot-notation extraction arrow -->
  <line x1="146" y1="58" x2="198" y2="58" stroke="#C74634" stroke-width="2" marker-end="url(#arr1)"/>
  <text x="172" y="50" text-anchor="middle" font-size="7.5" font-weight="600" fill="#C74634">dot notation</text>
  <!-- SQL operators box -->
  <rect x="200" y="36" width="140" height="90" rx="8" fill="#312D2A"/>
  <text x="270" y="56" text-anchor="middle" font-size="11" font-weight="700" fill="#fff">SQL Operators</text>
  <text x="270" y="74" text-anchor="middle" font-size="9.5" fill="#C74634" font-family="Source Code Pro, monospace">GROUP BY</text>
  <text x="270" y="90" text-anchor="middle" font-size="9.5" fill="rgba(255,255,255,0.6)" font-family="Source Code Pro, monospace">COUNT(*) / AVG()</text>
  <text x="270" y="106" text-anchor="middle" font-size="9.5" fill="rgba(255,255,255,0.6)" font-family="Source Code Pro, monospace">SUM() / MAX()</text>
  <!-- Arrow to result -->
  <line x1="342" y1="75" x2="398" y2="75" stroke="#C74634" stroke-width="2" marker-end="url(#arr1)"/>
  <text x="370" y="68" text-anchor="middle" font-size="8" font-weight="600" fill="#C74634">result</text>
  <!-- Relational result table -->
  <rect x="400" y="36" width="180" height="90" rx="8" fill="#fff" stroke="#E5E2DF" stroke-width="1.5"/>
  <text x="490" y="52" text-anchor="middle" font-size="10" font-weight="600" fill="#312D2A">Relational Result</text>
  <!-- Table header -->
  <line x1="410" y1="58" x2="570" y2="58" stroke="#E5E2DF" stroke-width="1"/>
  <text x="440" y="70" text-anchor="middle" font-size="8.5" font-weight="700" fill="#312D2A">type</text>
  <text x="510" y="70" text-anchor="middle" font-size="8.5" font-weight="700" fill="#312D2A">count</text>
  <text x="556" y="70" text-anchor="middle" font-size="8.5" font-weight="700" fill="#312D2A">avg</text>
  <line x1="410" y1="74" x2="570" y2="74" stroke="#E5E2DF" stroke-width="1"/>
  <!-- Table rows -->
  <text x="440" y="86" text-anchor="middle" font-size="8.5" fill="#9B9590" font-family="Source Code Pro, monospace">meeting</text>
  <text x="510" y="86" text-anchor="middle" font-size="8.5" fill="#9B9590" font-family="Source Code Pro, monospace">12</text>
  <text x="556" y="86" text-anchor="middle" font-size="8.5" fill="#9B9590" font-family="Source Code Pro, monospace">4.2</text>
  <text x="440" y="98" text-anchor="middle" font-size="8.5" fill="#9B9590" font-family="Source Code Pro, monospace">call</text>
  <text x="510" y="98" text-anchor="middle" font-size="8.5" fill="#9B9590" font-family="Source Code Pro, monospace">8</text>
  <text x="556" y="98" text-anchor="middle" font-size="8.5" fill="#9B9590" font-family="Source Code Pro, monospace">3.8</text>
  <text x="440" y="110" text-anchor="middle" font-size="8.5" fill="#9B9590" font-family="Source Code Pro, monospace">email</text>
  <text x="510" y="110" text-anchor="middle" font-size="8.5" fill="#9B9590" font-family="Source Code Pro, monospace">5</text>
  <text x="556" y="110" text-anchor="middle" font-size="8.5" fill="#9B9590" font-family="Source Code Pro, monospace">3.5</text>
  <!-- Bottom callouts -->
  <rect x="30" y="140" width="260" height="46" rx="5" fill="#C74634" fill-opacity="0.08" stroke="#C74634" stroke-width="1"/>
  <text x="160" y="158" text-anchor="middle" font-size="9" font-weight="600" fill="#C74634" font-family="Source Code Pro, monospace">GROUP BY ci.data.type.string()</text>
  <text x="160" y="176" text-anchor="middle" font-size="9" fill="#9B9590">Dot notation extracts &#8594; SQL aggregates</text>
  <rect x="310" y="140" width="260" height="46" rx="5" fill="#1B7D3A" fill-opacity="0.08" stroke="#1B7D3A" stroke-width="1"/>
  <text x="440" y="158" text-anchor="middle" font-size="10" font-weight="600" fill="#1B7D3A">Cost-Based Optimizer</text>
  <text x="440" y="176" text-anchor="middle" font-size="9" fill="#9B9590">Same execution plans as relational queries</text>
</svg>