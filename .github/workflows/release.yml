name: Release

on:
  push:
    tags: ['v*']

env:
  REGISTRY: ghcr.io
  APP_IMAGE: ghcr.io/${{ github.repository }}/app
  ORACLE_IMAGE: ghcr.io/${{ github.repository }}/oracle

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract version from tag
        id: version
        run: echo "VERSION=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Build and push app image
        run: |
          docker build -t ${{ env.APP_IMAGE }}:${{ steps.version.outputs.VERSION }} \
                       -t ${{ env.APP_IMAGE }}:latest \
                       -f Dockerfile .
          docker push ${{ env.APP_IMAGE }}:${{ steps.version.outputs.VERSION }}
          docker push ${{ env.APP_IMAGE }}:latest

      - name: Build and push Oracle image
        run: |
          docker build -t ${{ env.ORACLE_IMAGE }}:${{ steps.version.outputs.VERSION }} \
                       -t ${{ env.ORACLE_IMAGE }}:latest \
                       -f Dockerfile.oracle .
          docker push ${{ env.ORACLE_IMAGE }}:${{ steps.version.outputs.VERSION }}
          docker push ${{ env.ORACLE_IMAGE }}:latest
